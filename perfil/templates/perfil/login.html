{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block titulo %}Login | {% endblock %}

{% block conteudo %}
<div class="row">
    <div class="col-lg">
        <div class="mt-5">
            <h1>Login</h1>
            <p>Se você já possui uma conta, utilize o formulário abaixo para entrar.</p>

            <form method="POST" action="{% url 'perfil:login' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" name="username" class="form-control" id="username" placeholder="Digite seu usuário">
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" name="password" class="form-control" id="password" placeholder="Digite sua senha">
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
